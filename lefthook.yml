# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      root: frontend/
      glob:
        - "frontend/**/*.{vue,ts,js,mjs,json}"
        - "frontend/*.{vue,ts,js,mjs,json}"
      run: bun oxlint --fix {staged_files}
      stage_fixed: true

    - name: oxfmt
      root: frontend/
      glob:
        - "frontend/**/*.{vue,ts,js,mjs,json}"
        - "frontend/*.{vue,ts,js,mjs,json}"
      run: bun oxfmt --write {staged_files}
      stage_fixed: true

    - name: ruff-check
      root: backend/
      glob:
        - "backend/**/*.py"
        - "backend/*.py"
      run: uvx ruff check --fix {staged_files}
      stage_fixed: true

    - name: ruff-format
      root: backend/
      glob:
        - "backend/**/*.py"
        - "backend/*.py"
      run: uvx ruff format {staged_files}
      stage_fixed: true
