name: ci

on:
    schedule:
        - cron: "0 10 * * *" # everyday at 10am
    push:
        tags:
            - "v*.*.*"

jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Docker meta
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: doccano/doccano
                  tag-semver: |
                      {{version}}
                      {{major}}.{{minor}}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Login to DockerHub
              if: github.event_name != 'pull_request'
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            # - name: Build and push
            #   id: docker_build
            #   uses: docker/build-push-action@v7
            #   with:
            #       context: .
            #       platforms: linux/amd64,linux/arm64
            #       file: ./docker/Containerfile
            #       push: ${{ github.event_name != 'pull_request' }}
            #       tags: ${{ steps.docker_meta.outputs.tags }}
            #       labels: ${{ steps.docker_meta.outputs.labels }}

            - name: Build a backend image and push
              uses: docker/build-push-action@v7
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  file: ./docker/Containerfile.prod
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: doccano/doccano:backend
                  labels: ${{ steps.docker_meta.outputs.labels }}

            - name: Build a frontend image and push
              uses: docker/build-push-action@v7
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  file: ./docker/Containerfile.nginx
                  push: ${{ github.event_name != 'pull_request' }}
                  tags: doccano/doccano:frontend
                  labels: ${{ steps.docker_meta.outputs.labels }}
